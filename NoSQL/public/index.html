<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products Realtime</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #1f2937;
        background: #f5f7fb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }

      header {
        padding: 20px;
        color: #fff;
        background: #1f2937;
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }

      main {
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 20px;
        width: min(1100px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      section,
      form {
        border: 1px solid #d7dee9;
        border-radius: 8px;
        background: #fff;
      }

      form {
        display: grid;
        gap: 12px;
        align-self: start;
        padding: 16px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 700;
      }

      input,
      textarea,
      select,
      button {
        min-height: 42px;
        border-radius: 6px;
        font: inherit;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid #b8c4d5;
        padding: 9px 10px;
        background: #fff;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      button {
        border: 0;
        color: #fff;
        background: #2563eb;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }

      section {
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid #d7dee9;
      }

      .toolbar h2 {
        margin: 0;
        font-size: 18px;
      }

      #status {
        font-size: 14px;
        color: #4b5563;
      }

      #products {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 16px;
        list-style: none;
      }

      #products li {
        display: grid;
        gap: 6px;
        padding: 12px;
        border: 1px solid #d7dee9;
        border-radius: 8px;
        background: #fbfdff;
      }

      .product-title {
        font-weight: 800;
      }

      .product-meta {
        color: #4b5563;
        font-size: 14px;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Products realtime</h1>
    </header>

    <main>
      <div>
        <form id="category-form">
          <label>
            Category name
            <input id="categoryName" name="name" required />
          </label>
          <button type="submit">Create category</button>
        </form>

        <form id="product-form">
          <label>
            Name
            <input id="name" name="name" required />
          </label>
          <label>
            About
            <textarea id="about" name="about" required></textarea>
          </label>
          <label>
            Price
            <input id="price" name="price" required min="0.01" step="0.01" type="number" />
          </label>
          <label>
            Category
            <select id="categoryId" name="categoryId" required>
              <option value="">Create a category first</option>
            </select>
          </label>
          <button type="submit">Create product</button>
        </form>
      </div>

      <section>
        <div class="toolbar">
          <h2>Products</h2>
          <span id="status">Connecting...</span>
        </div>
        <ul id="products"></ul>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/frontend/main.js"></script>
  </body>
</html>
